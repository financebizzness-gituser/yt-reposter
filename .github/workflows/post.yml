name: Post Short Every 2 Hours

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit state back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install dependencies
        run: npm ci

      - name: Create credentials from secrets
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json

      - name: Restore state files
        run: |
          [ -f queue.json ]  || echo '[]'          > queue.json
          [ -f seen.json ]   || echo '[]'          > seen.json
          [ -f state.json ]  || echo '{"dailyCount":0,"lastResetDate":"","lastPostTime":null}' > state.json

      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Run scheduler
        run: node scheduler.js --once

      - name: Save state back to repo
        run: |
          git config user.name  "yt-reposter-bot"
          git config user.email "bot@yt-reposter"
          git add -f queue.json seen.json state.json
          git diff --staged --quiet || git commit -m "chore: update state after post [skip ci]"
          git push
